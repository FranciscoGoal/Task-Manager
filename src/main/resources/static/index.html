<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <div class="form" id="form">
            <input type="text" id="title" placeholder="Título de la tarea" autocomplete="off">
            <input type="text" id="description" placeholder="Descripción (opcional)" autocomplete="off">
            <button id="addBtn">Añadir Tarea</button>
        </div>

        <div class="task-list" id="taskList">
            <div class="empty">No hay tareas aún.</div>
        </div>
    </div>

    <script>
        const API = '/task';

        const titleInp = document.getElementById('title');
        const descInp = document.getElementById('description');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        addBtn.addEventListener('click', createTask);
        titleInp.addEventListener('keydown', e => { if (e.key === 'Enter') createTask(); });
        descInp.addEventListener('keydown', e => { if (e.key === 'Enter') createTask(); });

        async function loadTasks() {
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error(`Error ${res.status}`);
                const tasks = await res.json();
                renderTasks(tasks);
            } catch (err) {
                taskList.innerHTML = `<div class="empty">Error al cargar: ${err.message}</div>`;
            }
        }

        function renderTasks(tasks) {
            if (!tasks.length) {
                taskList.innerHTML = '<div class="empty">No hay tareas aún.</div>';
                return;
            }
            taskList.innerHTML = tasks.map(t => `
                <div class="task-card" data-id="${t.id}">
                    <div class="task-body">
                        <div class="task-title">${escapeHtml(t.title)}</div>
                        ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn-edit" onclick="editTask(${t.id})">Editar</button>
                        <button class="btn-delete" onclick="deleteTask(${t.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        async function createTask() {
            const title = titleInp.value.trim();
            if (!title) return;
            const description = descInp.value.trim();
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                if (!res.ok) throw new Error(`Error ${res.status}`);
                titleInp.value = '';
                descInp.value = '';
                await loadTasks();
            } catch (err) {
                alert('Error al crear: ' + err.message);
            }
        }

        async function deleteTask(id) {
            if (!confirm('¿Eliminar esta tarea?')) return;
            try {
                const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(`Error ${res.status}`);
                await loadTasks();
            } catch (err) {
                alert('Error al eliminar: ' + err.message);
            }
        }

        function editTask(id) {
            const card = document.querySelector(`.task-card[data-id="${id}"]`);
            const body = card.querySelector('.task-body');
            const title = body.querySelector('.task-title').textContent;
            const descEl = body.querySelector('.task-desc');
            const desc = descEl ? descEl.textContent : '';

            body.innerHTML = `
                <input class="edit-input" id="editTitle-${id}" value="${escapeHtml(title)}" placeholder="Título">
                <input class="edit-input" id="editDesc-${id}" value="${escapeHtml(desc)}" placeholder="Descripción" style="margin-top:4px">
            `;

            const actions = card.querySelector('.task-actions');
            actions.innerHTML = `
                <button class="btn-save" onclick="saveTask(${id})">Guardar</button>
                <button class="btn-cancel" onclick="loadTasks()">Cancelar</button>
            `;

            const titleInput = document.getElementById(`editTitle-${id}`);
            titleInput.focus();
            titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length);
            titleInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') saveTask(id);
                if (e.key === 'Escape') loadTasks();
            });
        }

        async function saveTask(id) {
            const title = document.getElementById(`editTitle-${id}`).value.trim();
            if (!title) return;
            const description = document.getElementById(`editDesc-${id}`).value.trim();
            try {
                const res = await fetch(`${API}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, title, description })
                });
                if (!res.ok) throw new Error(`Error ${res.status}`);
                await loadTasks();
            } catch (err) {
                alert('Error al guardar: ' + err.message);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadTasks();
    </script>
</body>
</html>
